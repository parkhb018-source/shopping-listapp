<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      color: #2d3748;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 10px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
      line-height: 1;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .input-row button:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-btn {
      flex: 1;
      padding: 7px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      color: #718096;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active {
      border-color: #667eea;
      color: #667eea;
      background: #ebf4ff;
      font-weight: 600;
    }

    .list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 2px solid #e2e8f0;
      background: #fff;
      transition: border-color 0.15s, opacity 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .item { animation: none; }
    }

    .item.checked {
      background: #f7f9fc;
      border-color: #cbd5e0;
      opacity: 0.65;
    }

    .item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      transition: text-decoration 0.15s, color 0.15s;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: #a0aec0;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #fc8181;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 0;
    }

    .clear-btn:hover {
      text-decoration: underline;
    }

    .loading {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .error-msg {
      text-align: center;
      color: #e53e3e;
      font-size: 0.85rem;
      padding: 12px;
      background: #fff5f5;
      border-radius: 8px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>
    <p class="subtitle" id="date-label"></p>

    <div id="error-area"></div>

    <div class="input-row">
      <label for="item-input" class="visually-hidden">쇼핑 아이템 입력</label>
      <input type="text" id="item-input" placeholder="아이템을 입력하세요..." maxlength="60">
      <button type="button" id="add-btn" onclick="addItem()" aria-label="아이템 추가">+</button>
    </div>

    <div class="filters" role="group" aria-label="목록 필터">
      <button type="button" class="filter-btn active" data-filter="all" aria-pressed="true" onclick="setFilter('all', this)">전체</button>
      <button type="button" class="filter-btn" data-filter="pending" aria-pressed="false" onclick="setFilter('pending', this)">미완료</button>
      <button type="button" class="filter-btn" data-filter="done" aria-pressed="false" onclick="setFilter('done', this)">완료</button>
    </div>

    <ul class="list" id="list"></ul>

    <div class="footer">
      <span id="count-label" aria-live="polite"></span>
      <button type="button" class="clear-btn" onclick="clearDone()">완료 항목 삭제</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://webpvmshyrwaleowjbjn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlYnB2bXNoeXJ3YWxlb3dqYmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjMzNzMsImV4cCI6MjA5Njk5OTM3M30.ZzXkSG4J9MKNegXjgjHCFOY9pLFXZKNpgz0o75GIOfg';

    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];
    let filter = 'all';

    function showError(msg) {
      const area = document.getElementById('error-area');
      area.innerHTML = `<div class="error-msg">${escapeHtml(msg)}</div>`;
      setTimeout(() => { area.innerHTML = ''; }, 4000);
    }

    async function loadItems() {
      document.getElementById('list').innerHTML = '<li class="loading">불러오는 중...</li>';
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        showError('데이터를 불러오지 못했습니다: ' + error.message);
        return [];
      }
      return data || [];
    }

    async function addItem() {
      const input = document.getElementById('item-input');
      const btn = document.getElementById('add-btn');
      const text = input.value.trim();
      if (!text) return;

      btn.disabled = true;
      const { data, error } = await db
        .from('shopping_items')
        .insert([{ text, checked: false }])
        .select()
        .single();
      btn.disabled = false;

      if (error) {
        showError('추가에 실패했습니다: ' + error.message);
        return;
      }

      items.unshift(data);
      render();
      input.value = '';
      input.focus();
    }

    async function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;

      const { error } = await db
        .from('shopping_items')
        .update({ checked: !item.checked })
        .eq('id', id);

      if (error) {
        showError('변경에 실패했습니다: ' + error.message);
        return;
      }

      item.checked = !item.checked;
      render();
    }

    async function deleteItem(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) {
        showError('삭제에 실패했습니다: ' + error.message);
        return;
      }

      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearDone() {
      const doneIds = items.filter(i => i.checked).map(i => i.id);
      if (doneIds.length === 0) return;

      const { error } = await db
        .from('shopping_items')
        .delete()
        .in('id', doneIds);

      if (error) {
        showError('삭제에 실패했습니다: ' + error.message);
        return;
      }

      items = items.filter(i => !i.checked);
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-pressed', 'false');
      });
      btn.classList.add('active');
      btn.setAttribute('aria-pressed', 'true');
      render();
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function render() {
      const list = document.getElementById('list');
      const filtered = items.filter(i => {
        if (filter === 'pending') return !i.checked;
        if (filter === 'done')    return i.checked;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<li class="empty">항목이 없습니다</li>';
      } else {
        list.innerHTML = filtered.map(i => `
          <li class="item ${i.checked ? 'checked' : ''}">
            <input type="checkbox" ${i.checked ? 'checked' : ''} aria-label="${escapeHtml(i.text)} 완료 체크" onchange="toggleItem('${i.id}')">
            <span class="item-text">${escapeHtml(i.text)}</span>
            <button type="button" class="delete-btn" onclick="deleteItem('${i.id}')" title="삭제" aria-label="${escapeHtml(i.text)} 삭제">&#10005;</button>
          </li>
        `).join('');
      }

      const done = items.filter(i => i.checked).length;
      document.getElementById('count-label').textContent =
        `총 ${items.length}개 · 완료 ${done}개`;
    }

    document.getElementById('item-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    const now = new Date();
    document.getElementById('date-label').textContent =
      now.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

    async function init() {
      items = await loadItems();
      render();
    }
    init();
  </script>
</body>
</html>
